# ──────────────────────────────────────────────────────────────
# CI-only ephemeral Postgres — festival-platform-template
#
# Usage (local CI simulation):
#   docker compose -f docker-compose.ci.yml up -d --wait
#   DATABASE_URL="postgres://ci:ci@localhost:5432/ci_e2e" pnpm exec drizzle-kit push --force
#   pnpm exec playwright test
#   docker compose -f docker-compose.ci.yml down -v
#
# Differences from docker-compose.yml (dev):
#   - Postgres 16-alpine (matches GHA services)
#   - No named volume → data is lost on `down -v` (ephemeral by design)
#   - tmpfs for /var/lib/postgresql/data → faster I/O, zero disk residue
#   - Stricter healthcheck (2s interval)
#   - No restart policy — fail fast in CI
# ──────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: festival-ci-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci_e2e
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      # Allow passwordless host connections in isolated CI (not for production)
      POSTGRES_HOST_AUTH_METHOD: trust
    tmpfs:
      - /var/lib/postgresql/data:rw,noexec,nosuid,size=256m
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci -d ci_e2e"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 3s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"
