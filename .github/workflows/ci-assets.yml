# ──────────────────────────────────────────────────────────────
# ci-assets.yml — Upload hero video assets to S3 / CloudFront
#
# Triggers:
#   - Push to main when files under public/hero/ change.
#   - Manual dispatch (workflow_dispatch) for ad-hoc uploads.
#
# Required secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#
# Required vars (repo-level or env):
#   S3_BUCKET, AWS_REGION, CDN_DOMAIN (optional)
# ──────────────────────────────────────────────────────────────
name: Upload Hero Assets

on:
  push:
    branches: [main]
    paths:
      - "public/hero/**"
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-upload all assets (ignore cache)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: assets-upload
  cancel-in-progress: false   # never cancel mid-upload

permissions:
  contents: read

env:
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  CDN_DOMAIN: ${{ vars.CDN_DOMAIN || '' }}

jobs:
  upload:
    name: "📦 Upload to S3"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2   # need parent commit for diff

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect changed hero assets
        id: changes
        run: |
          if [[ "${{ inputs.force }}" == "true" ]]; then
            echo "🔄 Force mode — uploading all assets"
            echo "files=$(find public/hero -type f | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
            echo "count=$(find public/hero -type f | wc -l)" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'public/hero/' || true)
            if [[ -z "$CHANGED" ]]; then
              echo "ℹ️ No hero assets changed"
              echo "count=0" >> "$GITHUB_OUTPUT"
              echo "files=" >> "$GITHUB_OUTPUT"
            else
              echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
              echo "count=$(echo "$CHANGED" | wc -l)" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload changed assets to S3
        if: steps.changes.outputs.count != '0'
        run: |
          set -euo pipefail
          echo "📤 Uploading ${{ steps.changes.outputs.count }} file(s)..."

          # Content-type mapping
          content_type_for() {
            local ext="${1##*.}"
            case "$ext" in
              mp4)       echo "video/mp4" ;;
              webm)      echo "video/webm" ;;
              mov)       echo "video/quicktime" ;;
              jpg|jpeg)  echo "image/jpeg" ;;
              png)       echo "image/png" ;;
              webp)      echo "image/webp" ;;
              avif)      echo "image/avif" ;;
              svg)       echo "image/svg+xml" ;;
              *)         echo "application/octet-stream" ;;
            esac
          }

          for file in ${{ steps.changes.outputs.files }}; do
            if [[ ! -f "$file" ]]; then
              echo "⚠️ Skipping (not a file): $file"
              continue
            fi
            filename=$(basename "$file")
            ct=$(content_type_for "$filename")
            s3_key="hero/${filename}"

            echo "  ⬆️ $file → s3://${S3_BUCKET}/${s3_key} ($ct)"

            aws s3 cp "$file" "s3://${S3_BUCKET}/${s3_key}" \
              --content-type "$ct" \
              --cache-control "public, max-age=31536000, immutable" \
              --metadata-directive REPLACE
          done

          echo "✅ Upload complete"

      - name: Invalidate CloudFront cache
        if: steps.changes.outputs.count != '0' && env.CDN_DOMAIN != ''
        run: |
          # Requires CDN_DISTRIBUTION_ID secret for invalidation
          DIST_ID="${{ secrets.CDN_DISTRIBUTION_ID }}"
          if [[ -z "$DIST_ID" ]]; then
            echo "⚠️ CDN_DISTRIBUTION_ID not set — skipping invalidation"
            exit 0
          fi

          echo "🔄 Invalidating CloudFront cache for /hero/*"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/hero/*"

      - name: Summary
        if: steps.changes.outputs.count != '0'
        run: |
          CDN_BASE="${CDN_DOMAIN:+https://${CDN_DOMAIN}/hero/}"
          S3_BASE="https://${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com/hero/"
          BASE="${CDN_BASE:-$S3_BASE}"

          echo "### 📦 Hero Assets Uploaded" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----|" >> "$GITHUB_STEP_SUMMARY"
          for file in ${{ steps.changes.outputs.files }}; do
            [[ -f "$file" ]] || continue
            fn=$(basename "$file")
            echo "| \`$fn\` | ${BASE}${fn} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Env var:** \`NEXT_PUBLIC_CDN_HERO_URL=${BASE}\`" >> "$GITHUB_STEP_SUMMARY"
