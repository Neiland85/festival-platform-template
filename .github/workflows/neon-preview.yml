name: "Neon Preview Branches"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_target:
    types: [closed]

concurrency:
  group: neon-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  NEON_BRANCH_NAME: "preview/pr-${{ github.event.pull_request.number }}"

jobs:
  create-branch:
    name: "🗄️ Create Neon preview branch"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write

    steps:
      # ─────────────────────────────
      # 1. Checkout repo
      # ─────────────────────────────
      - uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Setup pnpm
      # ─────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: "10"

      # ─────────────────────────────
      # 3. Setup Node
      # ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # ─────────────────────────────
      # 4. Install deps + neonctl
      # ─────────────────────────────
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          npm install -g neonctl@latest

      # ─────────────────────────────
      # 5. 🔥 AUTH NEON (CRÍTICO)
      # ─────────────────────────────
      - name: Authenticate Neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          neonctl auth login --api-key "$NEON_API_KEY"

      # ─────────────────────────────
      # 6. Create / reuse branch
      # ─────────────────────────────
      - name: Create or reuse Neon branch
        id: branch
        env:
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -u

          echo "::group::Check existing branch"
          EXISTING=$(neonctl branches list \
            --project-id "$NEON_PROJECT_ID" \
            --output json | jq -r --arg name "$NEON_BRANCH_NAME" \
            '.[] | select(.name == $name) | .id // empty')
          echo "::endgroup::"

          if [[ -n "$EXISTING" ]]; then
            echo "Reusing branch $EXISTING"
            BRANCH_ID="$EXISTING"
          else
            echo "::group::Creating branch"
            CREATE=$(neonctl branches create \
              --project-id "$NEON_PROJECT_ID" \
              --name "$NEON_BRANCH_NAME" \
              --output json)
            BRANCH_ID=$(echo "$CREATE" | jq -r '.branch.id')
            echo "Created $BRANCH_ID"
            echo "::endgroup::"
          fi

          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"

          echo "::group::Get connection string"
          CONN=$(neonctl connection-string \
            --project-id "$NEON_PROJECT_ID" \
            --branch "$BRANCH_ID")

          echo "::add-mask::$CONN"
          echo "database_url=$CONN" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      # ─────────────────────────────
      # 7. Push schema (Drizzle)
      # ─────────────────────────────
      - name: Push DB schema
        env:
          DATABASE_URL: ${{ steps.branch.outputs.database_url }}
        run: |
          echo "::add-mask::$DATABASE_URL"
          pnpm exec drizzle-kit push --force

      # ─────────────────────────────
      # 8. Set Vercel env
      # ─────────────────────────────
      - name: Set DATABASE_URL in Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ steps.branch.outputs.database_url }}
        run: |
          echo "::add-mask::$DATABASE_URL"

          curl -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"key\": \"DATABASE_URL\",
              \"value\": \"$DATABASE_URL\",
              \"target\": [\"preview\"],
              \"gitBranch\": \"${{ github.head_ref }}\"
            }"

      # ─────────────────────────────
      # 9. Wait (race condition fix)
      # ─────────────────────────────
      - name: Wait for env propagation
        run: sleep 5

      # ─────────────────────────────
      # 10. Redeploy Vercel
      # ─────────────────────────────
      - name: Trigger Vercel redeploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          curl -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"$VERCEL_PROJECT_ID\"
            }"

  delete-branch:
    name: "🗑️ Delete Neon preview branch"
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Install Neon CLI
        run: npm install -g neonctl@latest

      # 🔥 TAMBIÉN NECESITA AUTH
      - name: Authenticate Neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          neonctl auth login --api-key "$NEON_API_KEY"

      - name: Delete branch
        env:
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          ID=$(neonctl branches list \
            --project-id "$NEON_PROJECT_ID" \
            --output json | jq -r --arg name "$NEON_BRANCH_NAME" \
            '.[] | select(.name == $name) | .id // empty')

          if [[ -n "$ID" ]]; then
            neonctl branches delete "$ID" --project-id "$NEON_PROJECT_ID"
            echo "Deleted $NEON_BRANCH_NAME"
          else
            echo "Branch not found"
          fi
