# ──────────────────────────────────────────────────────────────
# Neon Preview Branches — festival-platform-template
#
# Lifecycle:
#   PR opened/reopened/synchronize → create Neon branch + set Vercel env
#   PR closed (merged or abandoned) → delete Neon branch + unset Vercel env
#
# Secrets required:
#   NEON_API_KEY       — Neon API key (Settings → API Keys)
#   NEON_PROJECT_ID    — Neon project ID (e.g. green-cloud-183924)
#   VERCEL_TOKEN       — Vercel API token
#   VERCEL_PROJECT_ID  — Vercel project ID
#
# Branch naming: preview/pr-{number} (deterministic, avoids duplicates)
# ──────────────────────────────────────────────────────────────
name: "Neon Preview Branches"

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_target:
    types: [closed]

concurrency:
  group: neon-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false  # Don't cancel deletes mid-flight

defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  NEON_BRANCH_NAME: "preview/pr-${{ github.event.pull_request.number }}"

jobs:
  # ── Create or update Neon preview branch ────────────────────
  create-branch:
    name: "🗄️ Create Neon preview branch"
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write  # For PR comments
    outputs:
      database_url: ${{ steps.branch.outputs.database_url }}
      branch_id: ${{ steps.branch.outputs.branch_id }}
    steps:
      - name: "Install Neon CLI"
        run: npm install -g neonctl@latest

      - name: "Create or reuse Neon branch"
        id: branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -u

          echo "::group::🔍 Check if branch already exists"
          EXISTING=$(neonctl branches list \
            --project-id "$NEON_PROJECT_ID" \
            --output json 2>/dev/null \
            | jq -r --arg name "$NEON_BRANCH_NAME" \
              '.[] | select(.name == $name) | .id // empty' \
          ) || true
          echo "::endgroup::"

          if [[ -n "$EXISTING" ]]; then
            echo "ℹ️  Branch '$NEON_BRANCH_NAME' already exists (id: $EXISTING) — reusing"
            BRANCH_ID="$EXISTING"
          else
            echo "::group::🆕 Creating Neon branch '$NEON_BRANCH_NAME'"
            CREATE_OUTPUT=$(neonctl branches create \
              --project-id "$NEON_PROJECT_ID" \
              --name "$NEON_BRANCH_NAME" \
              --output json \
              2>&1) || {
                echo "::error::Failed to create Neon branch"
                echo "$CREATE_OUTPUT"
                exit 1
              }
            BRANCH_ID=$(echo "$CREATE_OUTPUT" | jq -r '.branch.id')
            echo "✅ Created branch: $BRANCH_ID"
            echo "::endgroup::"
          fi

          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"

          # Get connection string for this branch
          echo "::group::🔗 Fetching connection string"
          CONN_STR=$(neonctl connection-string \
            --project-id "$NEON_PROJECT_ID" \
            --branch "$BRANCH_ID" \
            2>&1) || {
              echo "::error::Failed to get connection string for branch $BRANCH_ID"
              exit 1
            }

          # Mask the full connection string — it contains credentials
          echo "::add-mask::$CONN_STR"
          echo "database_url=$CONN_STR" >> "$GITHUB_OUTPUT"
          echo "✅ Connection string retrieved and masked"
          echo "::endgroup::"

      - name: "Set DATABASE_URL on Vercel preview"
        if: steps.branch.outputs.database_url != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          DATABASE_URL: ${{ steps.branch.outputs.database_url }}
        run: |
          set -u
          echo "::add-mask::$DATABASE_URL"

          echo "::group::🔧 Setting Vercel env var"

          # Check if DATABASE_URL already exists for preview
          EXISTING_ID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
            | jq -r '.envs[] | select(.key == "DATABASE_URL" and (.target | index("preview"))) | .id // empty' \
          ) || true

          if [[ -n "$EXISTING_ID" ]]; then
            # Update existing env var
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$EXISTING_ID" \
              -d "{\"value\": \"$DATABASE_URL\", \"target\": [\"preview\"], \"gitBranch\": \"${{ github.head_ref }}\"}")
            echo "Updated existing env var (HTTP $HTTP_CODE)"
          else
            # Create new env var scoped to this git branch
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env" \
              -d "{
                \"key\": \"DATABASE_URL\",
                \"value\": \"$DATABASE_URL\",
                \"target\": [\"preview\"],
                \"type\": \"encrypted\",
                \"gitBranch\": \"${{ github.head_ref }}\"
              }")
            echo "Created new env var (HTTP $HTTP_CODE)"
          fi

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "::error::Vercel API returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ DATABASE_URL set for preview branch '${{ github.head_ref }}'"
          echo "::endgroup::"

      - name: "📝 Post connection info to PR"
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🗄️ **Neon preview branch created**\n\n` +
                    `- Branch: \`${{ env.NEON_BRANCH_NAME }}\`\n` +
                    `- Branch ID: \`${{ steps.branch.outputs.branch_id }}\`\n` +
                    `- Vercel preview will use this database automatically.\n\n` +
                    `> Branch will be deleted when this PR is closed.`
            });

  # ── Delete Neon preview branch on PR close ──────────────────
  delete-branch:
    name: "🗑️ Delete Neon preview branch"
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Install Neon CLI"
        run: npm install -g neonctl@latest

      - name: "Delete Neon branch"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -u

          echo "::group::🔍 Finding branch '$NEON_BRANCH_NAME'"
          BRANCH_ID=$(neonctl branches list \
            --project-id "$NEON_PROJECT_ID" \
            --output json 2>/dev/null \
            | jq -r --arg name "$NEON_BRANCH_NAME" \
              '.[] | select(.name == $name) | .id // empty' \
          ) || true
          echo "::endgroup::"

          if [[ -z "$BRANCH_ID" ]]; then
            echo "⚠️  Branch '$NEON_BRANCH_NAME' not found — already deleted or never created"
            exit 0
          fi

          echo "::group::🗑️ Deleting branch $BRANCH_ID"
          neonctl branches delete "$BRANCH_ID" \
            --project-id "$NEON_PROJECT_ID" \
            2>&1 || {
              echo "::warning::Failed to delete Neon branch $BRANCH_ID — may need manual cleanup"
              exit 0  # Don't fail the workflow for cleanup issues
            }
          echo "✅ Deleted Neon branch: $NEON_BRANCH_NAME ($BRANCH_ID)"
          echo "::endgroup::"

      - name: "Remove Vercel env var"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -u

          echo "::group::🧹 Removing DATABASE_URL for closed PR"
          # Find the env var scoped to this git branch
          ENV_ID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env" \
            | jq -r --arg branch "${{ github.head_ref }}" \
              '.envs[] | select(.key == "DATABASE_URL" and .gitBranch == $branch) | .id // empty' \
          ) || true

          if [[ -z "$ENV_ID" ]]; then
            echo "ℹ️  No branch-scoped DATABASE_URL found — nothing to remove"
            exit 0
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env/$ENV_ID")

          if [[ "$HTTP_CODE" -ge 200 && "$HTTP_CODE" -lt 300 ]]; then
            echo "✅ Removed DATABASE_URL env var for branch '${{ github.head_ref }}'"
          else
            echo "::warning::Failed to remove Vercel env var (HTTP $HTTP_CODE) — may need manual cleanup"
          fi
          echo "::endgroup::"
