name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security audit (prod dependencies)
        # Note: --audit-level=high because next-sanity has a transitive moderate
        # vulnerability in js-yaml (<3.14.2) via @sanity/cli > @vercel/frameworks.
        # This is a dev-time CLI dependency, not exposed at runtime.
        run: pnpm audit --prod --audit-level=high

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build
