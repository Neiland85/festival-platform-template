# ──────────────────────────────────────────────────────────────
# CI Pipeline — festival-platform-template
#
# Hardening:
#   - `set -euo pipefail` on every `run:` step (defaults.run.shell)
#   - Secrets masked via `::add-mask::` before any job that sets env vars
#   - `audit-logs-scrub` post-job scans artifacts for leaked secrets
#
# Strategy: each job installs via pnpm (cached store = fast).
# Parallel quality gates → build → e2e.
# ──────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Global shell hardening ────────────────────────────────────
# errexit + pipefail on every `run:` step.
# Without pipefail, a failing command mid-pipe (e.g. `cmd | grep`) exits 0
# and the step appears green even though data was lost.
# NOTE: we intentionally omit --nounset (-u) at this level because
#   pnpm/corepack wrappers and lifecycle scripts reference optional
#   env vars without ${VAR:-} guards — causing spurious failures.
#   Our own multi-line scripts use `set -u` explicitly where safe.
defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Quality gates (parallel) ──────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: "🔠 Typecheck"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # ⚠️ These are CI-only test values — NOT real secrets.
      # They must match src/test/setup.ts defaults exactly (Zod singleton).
      # Even so, we mask them to prevent accidental copy-paste into logs
      # that a downstream consumer might treat as real credentials.
      DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
      SESSION_SECRET: "test-session-secret-must-be-at-least-32-characters-long"
      ADMIN_PASSWORD: "test-admin-password"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: "🔒 Mask CI secrets"
        run: |
          set -u
          echo "::add-mask::$SESSION_SECRET"
          echo "::add-mask::$ADMIN_PASSWORD"
          echo "::add-mask::$DATABASE_URL"
      - run: pnpm install --frozen-lockfile
      - name: "🧪 Run tests"
        run: pnpm test

  audit:
    name: "🛡️ Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high

  # ── Build (after all gates pass) ─────────────────────────
  build:
    name: "🏗️ Build"
    needs: [lint, typecheck, test, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "🔒 Mask build env"
        env:
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          SESSION_SECRET: "ci-session-secret-must-be-at-least-32-characters-long-for-zod"
          ADMIN_PASSWORD: "ci-admin-password"
        run: |
          set -u
          echo "::add-mask::$SESSION_SECRET"
          echo "::add-mask::$ADMIN_PASSWORD"
          echo "::add-mask::$DATABASE_URL"
      - run: pnpm build
        env:
          # Build-phase detection (NEXT_PHASE) handles missing runtime vars,
          # but we still set them so the build log stays clean.
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          SESSION_SECRET: "ci-session-secret-must-be-at-least-32-characters-long-for-zod"
          ADMIN_PASSWORD: "ci-admin-password"

  # ── E2E (after build) ────────────────────────────────────
  e2e:
    name: "🎭 E2E"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # ⚠️ CI-only values — masked in the step below.
      # E2E DATABASE_URL uses ci_e2e DB to avoid collisions with unit tests.
      DATABASE_URL: "postgres://ci:ci@localhost:5432/ci_e2e"
      SESSION_SECRET: "ci-session-secret-must-be-at-least-32-characters-long-for-zod"
      ADMIN_PASSWORD: "ci-admin-password"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: "🔒 Mask E2E secrets"
        run: |
          set -u
          echo "::add-mask::$SESSION_SECRET"
          echo "::add-mask::$ADMIN_PASSWORD"
          echo "::add-mask::$DATABASE_URL"
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: "🛡️ Guard: ensure DATABASE_URL is ephemeral CI DB"
        run: |
          set -u
          # SAFETY: drizzle-kit push --force is destructive (drops/recreates tables).
          # This guard ensures it ONLY runs against the ephemeral CI database.
          # If DATABASE_URL ever points to staging/prod, this step fails the job.
          ALLOWED_HOSTS=("localhost" "127.0.0.1" "postgres")
          ALLOWED_DBS=("ci_e2e" "ci_test" "ci")
          # Use Node URL parser — handles IPv6, missing userinfo, etc.
          DB_HOST=$(node -e 'try { const u = new URL(process.env.DATABASE_URL); console.log(u.hostname); } catch (e) { console.error("Invalid DATABASE_URL:", e.message); process.exit(1); }')
          DB_NAME=$(node -e 'try { const u = new URL(process.env.DATABASE_URL); const db = (u.pathname || "").replace(/^\/+/, "").split(/[/?]/)[0]; console.log(db); } catch (e) { console.error("Invalid DATABASE_URL:", e.message); process.exit(1); }')

          HOST_OK=false
          for h in "${ALLOWED_HOSTS[@]}"; do
            [[ "$DB_HOST" == "$h" ]] && HOST_OK=true
          done

          DB_OK=false
          for d in "${ALLOWED_DBS[@]}"; do
            [[ "$DB_NAME" == "$d" ]] && DB_OK=true
          done

          if [[ "$HOST_OK" != "true" || "$DB_OK" != "true" ]]; then
            echo "::error::🚨 DATABASE_URL points to '${DB_HOST}/${DB_NAME}' — NOT an ephemeral CI database."
            echo "::error::   drizzle-kit push --force is destructive and must only target CI DBs."
            echo "::error::   Allowed hosts: ${ALLOWED_HOSTS[*]}  |  Allowed DBs: ${ALLOWED_DBS[*]}"
            exit 1
          fi

          echo "✅ DATABASE_URL targets ephemeral CI DB: ${DB_HOST}/${DB_NAME}"

      - name: "🗄️ Push DB schema to ephemeral test database"
        run: pnpm exec drizzle-kit push --force
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Build for E2E (production server)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          CI: "true"

      # ── Audit logs scrub ──────────────────────────────────
      # Scans test-results/ and playwright-report/ for leaked secrets
      # BEFORE uploading artifacts. Fails the job if any are found.
      - name: "🔍 Audit logs for secret leaks"
        if: always()
        id: audit-scrub
        run: |
          set -u
          PATTERN='(API_KEY|SECRET|PASSWORD|SESSION_SECRET|ADMIN_PASSWORD|STRIPE_SECRET|DATABASE_URL|SENTRY_AUTH_TOKEN|CSRF_SECRET|IP_HASH_SALT)\s*[=:]\s*[^\s*]{4,}'
          DIRS=()
          [[ -d test-results ]]      && DIRS+=(test-results)
          [[ -d playwright-report ]] && DIRS+=(playwright-report)

          if [[ ${#DIRS[@]} -eq 0 ]]; then
            echo "ℹ️  No artifact directories found — nothing to scrub"
            exit 0
          fi

          echo "🔍 Scanning ${DIRS[*]} for secret patterns..."
          HITS=$(grep -rEn "$PATTERN" "${DIRS[@]}" 2>/dev/null || true)

          if [[ -n "$HITS" ]]; then
            # Count and show filenames + line numbers only (NOT the actual values)
            FILECOUNT=$(echo "$HITS" | cut -d: -f1 | sort -u | wc -l)
            HITCOUNT=$(echo "$HITS" | wc -l)
            echo "::error::🚨 Found $HITCOUNT potential secret leak(s) across $FILECOUNT file(s):"
            echo "$HITS" | cut -d: -f1-2 | sort -u | while read -r loc; do
              echo "::error::  → $loc"
            done
            echo ""
            echo "❌ Artifacts contain secret-like values. Fix the tests to avoid logging credentials."
            echo "   Tip: use vitest.mock() or redact env vars before assertions that stringify responses."
            exit 1
          fi

          echo "✅ No secret patterns detected in artifact directories"

      - name: "📦 Upload test artifacts on failure"
        if: failure() && steps.audit-scrub.outcome != 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: "🚫 Block artifact upload — secrets detected"
        if: steps.audit-scrub.outcome == 'failure'
        run: |
          echo "::error::Artifact upload BLOCKED — audit-logs-scrub detected secret leaks."
          echo "Fix the leak source and re-run. See the 'Audit logs for secret leaks' step above."
          exit 1
