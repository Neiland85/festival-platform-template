# ──────────────────────────────────────────────────────────────
# CI Pipeline — festival-platform-template
#
# Strategy: each job installs via pnpm (cached store = fast).
# Parallel quality gates → build → e2e.
# ──────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Quality gates (parallel) ──────────────────────────────
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: "🔠 Typecheck"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
      SESSION_SECRET: "ci-session-secret-must-be-at-least-32-characters-long-for-zod"
      ADMIN_PASSWORD: "ci-admin-password"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  audit:
    name: "🛡️ Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high

  # ── Build (after all gates pass) ─────────────────────────
  build:
    name: "🏗️ Build"
    needs: [lint, typecheck, test, audit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Build-phase detection (NEXT_PHASE) handles missing runtime vars,
          # but we still set them so the build log stays clean.
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          SESSION_SECRET: "ci-session-secret-must-be-at-least-32-characters-long-for-zod"
          ADMIN_PASSWORD: "ci-admin-password"

  # ── E2E (after build) ────────────────────────────────────
  e2e:
    name: "🎭 E2E"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Runtime env vars for the web server that Playwright starts.
    # These are CI-only dummy values — no real secrets needed.
    env:
      DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
      SESSION_SECRET: "ci-session-secret-must-be-at-least-32-characters-long-for-zod"
      ADMIN_PASSWORD: "ci-admin-password"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Build for E2E (production server)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - run: pnpm exec playwright test
        env:
          CI: "true"
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
