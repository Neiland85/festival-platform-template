# Prometheus Configuration for SRE Soak Testing
# Copy to: /etc/prometheus/prometheus.yml (or $PROMETHEUS_HOME/prometheus.yml)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "local"
    job: "soak_test"

scrape_configs:
  # Your application metrics
  - job_name: "application"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/metrics"

  # Redis (via redis_exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["localhost:9121"]

  # Postgres (via postgres_exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["localhost:9187"]

  # Node exporter (host metrics)
  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

  # Optional: Pushgateway for custom metrics
  - job_name: "pushgateway"
    static_configs:
      - targets: ["localhost:9091"]
